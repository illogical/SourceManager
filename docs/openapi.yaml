openapi: 3.1.0

info:
  title: SourceManager API
  version: 1.1.0
  description: |
    Secure HTTP API for triggering Git operations and managing server process lifecycle
    on a Windows dev machine. Designed to be called by AI agents on remote machines.

    All `/v1/*` endpoints require the `X-DevServer-Token` header.
    Unauthenticated endpoints: `GET /health`, `GET /swagger`, `GET /swagger/json`.

servers:
  - url: http://localhost:17106
    description: Local dev server (default port)

tags:
  - name: Health
    description: API liveness (unauthenticated)
  - name: Repos
    description: Repo and service listing, detail, and logs
  - name: Update
    description: Git pull / branch-switch workflow
  - name: Lifecycle
    description: Service process start, stop, and restart

security:
  - DevServerToken: []

# ── Components ────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    DevServerToken:
      type: apiKey
      in: header
      name: X-DevServer-Token

  schemas:

    StepStatus:
      type: string
      enum: [pending, success, failure, skipped]

    StepResult:
      type: object
      required: [step, status, message, durationMs]
      properties:
        step:
          type: string
          example: pull
        status:
          $ref: '#/components/schemas/StepStatus'
        message:
          type: string
          example: Pulled 3 commits
        durationMs:
          type: integer
          minimum: 0
          example: 280

    InstallRunResult:
      type: object
      required: [status, reason]
      properties:
        status:
          $ref: '#/components/schemas/StepStatus'
        reason:
          type: string
          example: no dependency changes
        durationMs:
          type: integer
          minimum: 0

    RestartRunResult:
      type: object
      required: [status, reason]
      properties:
        status:
          $ref: '#/components/schemas/StepStatus'
        reason:
          type: string
          example: health failure triggered restart
        durationMs:
          type: integer
          minimum: 0

    RunReport:
      type: object
      required:
        - runId
        - serviceId
        - repoId
        - startedAt
        - durationMs
        - branch
        - dryRun
        - updated
        - reason
        - installRun
        - restartRun
        - healthStatus
        - steps
      properties:
        runId:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        serviceId:
          type: string
          example: my-app-web
        repoId:
          type: string
          example: my-app
        startedAt:
          type: string
          format: date-time
          example: "2026-03-01T12:00:00.000Z"
        durationMs:
          type: integer
          minimum: 0
          example: 4890
        branch:
          type: string
          example: main
        dryRun:
          type: boolean
          example: false
        updated:
          type: boolean
          example: true
        reason:
          type: string
          example: Pulled main successfully
        installRun:
          $ref: '#/components/schemas/InstallRunResult'
        restartRun:
          $ref: '#/components/schemas/RestartRunResult'
        healthStatus:
          type: string
          enum: [pass, fail, skipped]
          example: pass
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepResult'

    LifecycleState:
      type: string
      enum: [starting, running, stopped, failed]
      example: running

    ServiceLifecycle:
      type: object
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/LifecycleState'
        pid:
          type: integer
          example: 12345
        startedAt:
          type: string
          format: date-time
        readySince:
          type: string
          format: date-time
        uptimeMs:
          type: integer
          minimum: 0
          example: 1800000
        command:
          type: string
          example: bun run dev
        lastError:
          type: string
          example: Health check did not pass within 30s

    TailnetInfo:
      type: object
      required: [hostname, domain]
      properties:
        hostname:
          type: string
          example: my-machine
        domain:
          type: string
          example: tail12345.ts.net
        serveEnabled:
          type: boolean
          example: true
        serveMode:
          type: string
          enum: [https, http]
          example: https
        serveTarget:
          type: string
          example: http://localhost:3000

    ServiceSummary:
      type: object
      required: [id, displayName, port, healthUrl, healthMode, packageManager, scriptName, tags, allowedIps, lifecycle]
      properties:
        id:
          type: string
          example: my-app-web
        displayName:
          type: string
          example: Web Server
        port:
          type: integer
          example: 3000
        healthUrl:
          type: string
          format: uri
          example: http://localhost:3000/health
        healthMode:
          type: string
          enum: [ping, full]
          example: ping
        packageManager:
          type: string
          enum: [auto, bun, npm, yarn, pnpm]
          example: auto
        scriptName:
          type: string
          example: dev
        tags:
          type: array
          items:
            type: string
          example: []
        allowedIps:
          type: array
          items:
            type: string
          example: []
        tailnet:
          oneOf:
            - $ref: '#/components/schemas/TailnetInfo'
            - type: 'null'
        lifecycle:
          $ref: '#/components/schemas/ServiceLifecycle'

    RepoSummary:
      type: object
      required: [id, displayName, repoPath, defaultBranch, services]
      properties:
        id:
          type: string
          example: my-app
        displayName:
          type: string
          example: My Application
        repoPath:
          type: string
          example: "C:\\LocalDev\\Projects\\myapp"
        defaultBranch:
          type: string
          example: main
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSummary'

    UpdateAccepted:
      type: object
      required: [runId, serviceId, repoId, startedAt, branch, status, message]
      properties:
        runId:
          type: string
          format: uuid
        serviceId:
          type: string
          example: my-app-web
        repoId:
          type: string
          example: my-app
        startedAt:
          type: string
          format: date-time
        branch:
          type: string
          example: main
        status:
          type: string
          example: accepted
        message:
          type: string
          example: Update started

    PortEntry:
      type: object
      required: [port, serviceId, pid, status]
      properties:
        port:
          type: integer
          example: 3000
        serviceId:
          type: string
          example: my-app-web
        pid:
          type: integer
          example: 12345
        status:
          type: string
          enum: [running, stopped]
          example: running

    StartStopResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        alreadyStopped:
          type: boolean
          description: Present and true when stop is called on a service that was not running.
        lifecycle:
          $ref: '#/components/schemas/ServiceLifecycle'
        message:
          type: string
          example: Service started

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Unauthorized

  responses:
    Unauthorized:
      description: Missing or invalid `X-DevServer-Token` header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized

    NotFound:
      description: Repo or service ID not found in config.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: 'Service not found: "unknown-svc"'

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:

  /health:
    get:
      operationId: getHealth
      summary: API liveness check
      tags: [Health]
      security: []
      responses:
        '200':
          description: API is running.
          content:
            application/json:
              schema:
                type: object
                required: [status, version, uptimeMs]
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.1.0
                  uptimeMs:
                    type: integer
                    example: 86400000

  /swagger:
    get:
      operationId: getSwaggerUi
      summary: Swagger UI
      tags: [Health]
      security: []
      responses:
        '200':
          description: Swagger UI HTML page.
          content:
            text/html:
              schema:
                type: string

  /swagger/json:
    get:
      operationId: getOpenApiSpec
      summary: Raw OpenAPI spec
      tags: [Health]
      security: []
      responses:
        '200':
          description: OpenAPI 3.x specification object.
          content:
            application/json:
              schema:
                type: object

  /v1/repos:
    get:
      operationId: listRepos
      summary: List all repos with services
      description: Returns all configured repos with nested services and their current lifecycle state.
      tags: [Repos]
      responses:
        '200':
          description: Repos list.
          content:
            application/json:
              schema:
                type: object
                required: [repos]
                properties:
                  repos:
                    type: array
                    items:
                      $ref: '#/components/schemas/RepoSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/repos/{repoId}:
    get:
      operationId: getRepo
      summary: Get single repo detail
      tags: [Repos]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
          example: my-app
      responses:
        '200':
          description: Repo detail with services.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}:
    get:
      operationId: getService
      summary: Get single service detail
      tags: [Repos]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service detail with lifecycle state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}/logs:
    get:
      operationId: getServiceLogs
      summary: Get recent run logs for a service
      tags: [Repos]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
        - name: n
          in: query
          required: false
          description: Number of entries (1–100, default 20).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recent run logs.
          content:
            application/json:
              schema:
                type: object
                required: [serviceId, repoId, count, logs]
                properties:
                  serviceId:
                    type: string
                    example: my-app-web
                  repoId:
                    type: string
                    example: my-app
                  count:
                    type: integer
                    example: 5
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}/start:
    post:
      operationId: startService
      summary: Start a service
      description: Spawns the service process. Auto-kills any conflicting process on the port.
      tags: [Lifecycle]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Start result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartStopResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}/stop:
    post:
      operationId: stopService
      summary: Stop a service (idempotent)
      description: Stops the service if running. Returns success even if service was not tracked.
      tags: [Lifecycle]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stop result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartStopResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}/restart:
    post:
      operationId: restartService
      summary: Restart a service
      description: Stops the current process then starts a new one.
      tags: [Lifecycle]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restart result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartStopResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/repos/{repoId}/services/{serviceId}/update:
    post:
      operationId: updateService
      summary: Trigger git update workflow for a service
      description: |
        Runs the full safe update state machine against the service's repo.
        Steps: precheck → fetch → checkout → pull → depCheck → install → restart → health → health-retry.
        Any step failure short-circuits remaining steps (recorded as `skipped`).
      tags: [Update]
      parameters:
        - name: repoId
          in: path
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: string
                  description: Branch to checkout and pull. Defaults to repo's `defaultBranch`.
                  example: feature/xyz
                installMode:
                  type: string
                  enum: [auto, always, never]
                  default: auto
                restartMode:
                  type: string
                  enum: [auto, always, never]
                  default: auto
                dryRun:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Run report with per-step results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
